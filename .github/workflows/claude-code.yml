name: Claude Code — Autonomous Ticket Resolution

on:
  issues:
    types: [labeled]

jobs:
  claude-fix:
    # Fires when Port creates a GitHub issue and adds the "claude" label
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          custom_instructions: |
            After committing your fix, open a pull request using:
            gh pr create --title "fix: <short description>" --body "<what was fixed and why>"
            Do not wait for human input — open the PR as the final step.
