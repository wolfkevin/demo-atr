<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test: Recategorization Banner</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 24px; color: #1a1a1a; }
    .container { max-width: 900px; margin: 0 auto; }
    
    .recategorize-banner {
      display: none;
      align-items: center;
      gap: 12px;
      background: #fff8e1;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .recategorize-banner .icon { font-size: 18px; }
    
    .dirty-pill { background: #fee2e2; color: #dc2626; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .test-result { padding: 12px; margin: 10px 0; border-radius: 6px; font-weight: 600; }
    .test-pass { background: #dcfce7; color: #166534; }
    .test-fail { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Recategorization Banner Test</h1>
    
    <div class="recategorize-banner" id="recategorizeBanner">
      <span class="icon">⚠️</span>
      <span><strong>Recategorization required.</strong> You've made changes that affect attribution.</span>
    </div>

    <!-- Test scenario: with dirty pills present -->
    <div style="display: none;">
      <span class="dirty-pill">Changes pending</span>
      <span class="dirty-pill">Changes pending</span>
    </div>

    <div id="testResults"></div>
    <button onclick="runTests()">Run Tests</button>
  </div>

  <script>
    function testBannerVisibility() {
      const results = [];
      
      // Test 1: Banner should show when dirty pills exist
      const isDirty = document.querySelectorAll('.dirty-pill').length > 0;
      document.getElementById('recategorizeBanner').style.display = isDirty ? 'flex' : 'none';
      
      const bannerStyle = window.getComputedStyle(document.getElementById('recategorizeBanner'));
      const isVisible = bannerStyle.display === 'flex';
      
      if (isDirty && isVisible) {
        results.push('<div class="test-result test-pass">✅ PASS: Banner shows when changes are pending</div>');
      } else if (!isDirty && !isVisible) {
        results.push('<div class="test-result test-pass">✅ PASS: Banner hidden when no changes pending</div>');
      } else {
        results.push('<div class="test-result test-fail">❌ FAIL: Banner visibility incorrect</div>');
      }
      
      // Test 2: Verify banner content
      const bannerText = document.getElementById('recategorizeBanner').textContent;
      if (bannerText.includes('Recategorization required')) {
        results.push('<div class="test-result test-pass">✅ PASS: Banner has correct warning text</div>');
      } else {
        results.push('<div class="test-result test-fail">❌ FAIL: Banner text incorrect</div>');
      }
      
      return results;
    }

    function runTests() {
      const results = testBannerVisibility();
      document.getElementById('testResults').innerHTML = '<h3>Test Results:</h3>' + results.join('');
    }
    
    // Auto-run tests on page load
    window.onload = runTests;
  </script>
</body>
</html>
