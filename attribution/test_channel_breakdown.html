<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Channel Breakdown Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    .test { margin-bottom: 16px; }
    .test.pass { color: green; }
    .test.fail { color: red; }
  </style>
</head>
<body>
  <h1>Channel Breakdown Table Tests</h1>
  <div id="test-results"></div>

  <script>
    // Test data
    const testData = {
      channels: [
        {
          name: "Paid Social",
          impressions: 1000,
          conversions: 35,
          touchpointDates: ["2024-01-05", "2024-01-18"]
        },
        {
          name: "Paid Search", 
          impressions: 2000,
          conversions: 60,
          touchpointDates: ["2024-01-02", "2024-01-12"]
        }
      ],
      conversionDate: "2024-01-30"
    };

    // Copy avgWindowDays function from main file
    function avgWindowDays(touchpoints, conversion) {
      const conv = new Date(conversion);
      const total = touchpoints.reduce((sum, tp) => {
        const t = new Date(tp);
        return sum + (conv - t);
      }, 0);
      return Math.round(total / touchpoints.length / 86400000);
    }

    // Test functions
    function runTests() {
      const results = document.getElementById("test-results");
      
      // Test 1: Conversion rate calculation
      const channel1Rate = (testData.channels[0].conversions / testData.channels[0].impressions * 100);
      const test1Pass = Math.abs(channel1Rate - 3.5) < 0.01;
      results.innerHTML += `<div class="test ${test1Pass ? 'pass' : 'fail'}">
        Test 1: Conversion rate calculation (${channel1Rate.toFixed(1)}% expected 3.5%) - ${test1Pass ? 'PASS' : 'FAIL'}
      </div>`;

      // Test 2: Attribution window calculation  
      const window1 = avgWindowDays(testData.channels[0].touchpointDates, testData.conversionDate);
      const expectedWindow = Math.round(((30-5) + (30-18)) / 2); // 18.5 days rounded to 19
      const test2Pass = window1 === expectedWindow;
      results.innerHTML += `<div class="test ${test2Pass ? 'pass' : 'fail'}">
        Test 2: Attribution window calculation (${window1} days, expected ${expectedWindow} days) - ${test2Pass ? 'PASS' : 'FAIL'}
      </div>`;

      // Test 3: Rate styling classes
      const rate1 = 3.5; // should be rate-good
      const rate2 = 2.5; // should be rate-fair  
      const rate3 = 1.5; // should be rate-poor
      
      function getRateClass(rate) {
        if (rate >= 3.0) return "rate-good";
        else if (rate >= 2.0) return "rate-fair";
        return "rate-poor";
      }
      
      const test3Pass = getRateClass(rate1) === "rate-good" && 
                       getRateClass(rate2) === "rate-fair" && 
                       getRateClass(rate3) === "rate-poor";
      results.innerHTML += `<div class="test ${test3Pass ? 'pass' : 'fail'}">
        Test 3: Rate styling classes - ${test3Pass ? 'PASS' : 'FAIL'}
      </div>`;

      // Summary
      const allTestsPass = test1Pass && test2Pass && test3Pass;
      results.innerHTML += `<div class="test ${allTestsPass ? 'pass' : 'fail'}">
        <strong>Overall: ${allTestsPass ? 'ALL TESTS PASS' : 'SOME TESTS FAILED'}</strong>
      </div>`;
    }

    runTests();
  </script>
</body>
</html>
